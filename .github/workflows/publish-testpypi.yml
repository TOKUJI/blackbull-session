name: Publish to TestPyPI

# Manual rehearsal channel.  Triggered via the Actions UI
# (``workflow_dispatch``) so we can iterate on alpha builds against
# test.pypi.org without burning a real PyPI release.  Use the
# ``v*`` tag → real PyPI workflow once we're satisfied with the shape.
#
# Prerequisite (one-time, maintainer):
#   TestPyPI project "blackbull-session" has a Trusted Publisher entry
#   naming ``TOKUJI/blackbull-session`` + workflow ``publish-testpypi.yml``.
#   If the configured workflow filename differs, this file must be
#   renamed to match — TestPyPI's OIDC token exchange will reject any
#   other filename.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10   # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405   # v6.2.0
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build wheel + sdist
        run: python -m build

      - name: List build artefacts
        run: ls -la dist/

      - name: Upload artefacts for the publish job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to TestPyPI via OIDC
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: testpypi
      url: https://test.pypi.org/project/blackbull-session/
    permissions:
      id-token: write
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c   # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        # See the BlackBull publish.yml for why this action is pinned by
        # version tag rather than commit SHA (Docker image tag layout).
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
